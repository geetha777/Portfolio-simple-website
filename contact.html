<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <link rel="stylesheet" href="contact.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Young+Serif&display=swap"
      rel="stylesheet" />
  </head>
  <body>
    <div class="container">
      <div class="section-one">
        <h1 class="section-one__name">Geetha Priyatharshini</h1>
        <p class="section-one__role">web Developer</p>
        <a class="section-one__contact" href="index.html">Home</a>
      </div>

      <div class="contact-form">
        <form>
          <table>
            <tr>
              <td>name</td>
              <td>
                <input
                  type="text"
                  placeholder="enter name"
                  class="contact-form__input" />
              </td>
            </tr>
            <tr>
              <td>Email</td>
              <td>
                <input
                  type="email"
                  placeholder="enter email"
                  class="contact-form__input" />
              </td>
            </tr>
            <tr>
              <td>Address</td>
              <td>
                <input
                  type="textarea"
                  placeholder="enter msg"
                  class="contact-form__textarea" />
              </td>
            </tr>
            <tr>
              <td>
                <input
                  type="submit"
                  value="submit"
                  class="contact-form__submit" />
              </td>
            </tr>
          </table>
        </form>
      </div>

      <div class="section-five">
        <p class="section-five__title">
          Social Media:
          <a href="https://www.linkedin.com/">Linkedin</a>
          <a href="https://www.instagram.com/">Instagram</a>
        </p>
        <p class="section-five__desc">&copy; All Rights Reserved</p>
      </div>
    </div>
  </body>
</html>
